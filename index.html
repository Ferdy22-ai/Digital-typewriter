<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Ferdy's Daily Summary</title>
<link href="assets/heart.png" rel="icon" type="image/png"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&amp;display=swap" rel="stylesheet"/>
<link href="styles.css" rel="stylesheet"/>
</head>
<body>
<div aria-hidden="true" class="bg-sparkles"></div>
<div aria-hidden="true" class="bg-decors"></div>
<main id="stage">
<header class="intro">
<h1>Ferdy's Daily Summary</h1>
</header>
<div class="printer-wrap">
<img alt="printer" class="printer" src="assets/printer.png"/>
<div class="printer-text">₊✩‧₊˚print me₊✩‧₊˚</div>
<div class="heart"></div>
</div>
<button class="print-btn" id="printBtn" type="button"></button>
<article class="receipt" id="receipt">
<span class="receipt-date" id="receiptDate"></span>
<h2>My silly day</h2>
<hr/>
<section class="receipt-section receipt-section-events">
<h3>Events</h3>
<ul class="events"><li><span class="event-icon event-work">work</span><span class="label">UAS Kapita Selekta</span><span class="time">13:00 - 13.30</span></li><li><span class="event-icon event-work">work</span><span class="label">UAS Antikorupsi</span><span class="time">07.00 - 11.00</span></li></ul>
</section>
<hr/>
<section class="receipt-section receipt-section-todos">
<h3>To do list</h3>
<ul class="todos"><li class="todo"><span class="todo-icon todo-personal">personal</span><span class="label">Olah raga</span><span class="time">15.50 - 16.30</span></li><li class="todo"><span class="todo-icon todo-work">work</span><span class="label">PPT Skripsi</span><span class="time">20.00 - 21.00</span></li><li class="todo"><span class="todo-icon todo-work">work</span><span class="label">Bimbingan</span><span class="time">13.30 - 14.30</span></li></ul>
</section>
</article>
</main>
<script defer="" src="script.js"></script>
</body>
</html>
